<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Chi Wai Lau Portfolio</title>

<style>

/* =========================
全局顏色
========================= */

:root{
--bg:#1c1a00;
--panel:rgba(40,38,5,0.82);
--panel-border:rgba(142,135,53,0.35);
--text:#f3f0e6;
--muted:#c8c1a3;
--line:rgba(255,255,255,0.35);
--menu-bg:rgba(8,8,8,0.96);
--button-bg:rgba(255,255,255,0.06);
--button-border:rgba(255,255,255,0.24);
}

/* =========================
基礎
========================= */

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
background:var(--bg);
color:var(--text);
font-family:Arial,Helvetica,sans-serif;

/* 防止縮細時 layout 壓縮 */
min-width:1280px;
overflow-x:auto;
}

/* =========================
背景
========================= */

body{
min-height:100vh;
background:
linear-gradient(rgba(0,0,0,0.55),rgba(0,0,0,0.72)),
url("assets/hero-studio.png") center center / cover no-repeat fixed;
}

a{
color:inherit;
text-decoration:none;
}

/* =========================
頁面寬度（固定）
========================= */

.page{
width:1220px;
margin:0 auto;
padding:24px 0 40px;
}

/* =========================
主框
========================= */

.frame{
background:rgba(40,38,5,0.82);
border:1px solid rgba(142,135,53,0.35);
padding:22px 22px 34px;
position:relative;
overflow:visible;
}

/* =========================
網站標題
========================= */

.site-title{
position:absolute;
top:140px;
left:50%;
transform:translateX(-50%);
text-align:center;
line-height:1;
z-index:40;
}

.portfolio-word{
display:block;
font-size:22px;
font-weight:800;
letter-spacing:1px;
}

.name-word{
display:block;
margin-top:3px;
font-size:12px;
font-weight:600;
letter-spacing:0.6px;
color:var(--muted);
}

/* =========================
Top menu
========================= */

.topbar{
display:flex;
justify-content:flex-start;
align-items:center;
gap:40px;
margin-bottom:0;
position:relative;
z-index:30;
padding:4px 0 8px;
}

.nav{
display:flex;
gap:32px;
align-items:center;
font-weight:700;
color:var(--muted);
font-size:18px;
}

.nav>a,
.dropdown>a{
display:inline-flex;
align-items:center;
height:40px;
}

.nav a:hover{
color:var(--text);
}

/* dropdown */

.dropdown{
position:relative;
}

.dropdown::after{
content:"";
position:absolute;
left:0;
top:100%;
width:100%;
height:18px;
}

.dropdown-menu{
position:absolute;
top:100%;
left:0;
min-width:220px;
background:var(--menu-bg);
border:1px solid rgba(255,255,255,0.08);
padding:14px 22px;
display:none;
z-index:50;
}

.dropdown:hover .dropdown-menu{
display:block;
}

.dropdown-menu a{
display:block;
padding:7px 0;
color:var(--muted);
font-size:17px;
font-weight:700;
transition:0.2s;
}

.dropdown-menu a::before{
content:"▶ ";
opacity:0;
transition:0.2s;
}

.dropdown-menu a:hover{
color:var(--text);
transform:translateX(4px);
}

.dropdown-menu a:hover::before{
opacity:1;
}

/* =========================
Hero
========================= */

.hero{
position:relative;
margin-top:8px;
}

.hero-image-wrap{
position:relative;
overflow:hidden;
border:1px solid rgba(255,255,255,0.05);
background:#111;
}

.hero-image{
width:100%;
display:block;
aspect-ratio:16/10;
object-fit:cover;
filter:brightness(0.88);
}

/* logo */

.hero-center-logo{
position:absolute;
top:14%;
left:50%;
transform:translateX(-50%);
width:94px;
height:94px;
border:4px solid rgba(255,255,255,0.96);
border-radius:50%;
overflow:hidden;
background:rgba(0,0,0,0.06);
}

.hero-center-logo img{
width:100%;
height:100%;
object-fit:cover;
}

/* headline */

.hero-headline{
position:absolute;
top:32%;
left:50%;
transform:translateX(-50%);
width:600px;
text-align:center;
font-size:30px;
line-height:1.2;
font-weight:700;
}

/* =========================
Layout
========================= */

.bottom-grid{
display:grid;
grid-template-columns:320px 1fr;
gap:52px;
margin-top:28px;
align-items:start;
padding-left:28px;
padding-right:12px;
}

/* =========================
side list
========================= */

.side-title{
display:inline-block;
border:1px solid rgba(255,255,255,0.38);
padding:13px 18px;
font-size:18px;
font-weight:700;
margin-bottom:24px;
}

.side-list{
list-style:none;
margin:0;
padding:0 0 0 6px;
}

.side-list li{
margin-bottom:18px;
}

.side-list a{
font-size:22px;
font-weight:700;
color:var(--muted);
line-height:1.4;
transition:0.2s;
display:inline-block;
}

.side-list a::before{
content:"▶ ";
opacity:0;
transition:0.2s;
}

.side-list a:hover{
color:var(--text);
transform:translateX(4px);
}

.side-list a:hover::before{
opacity:1;
}

/* =========================
detail
========================= */

.project-detail{
border-left:2px solid var(--line);
padding-left:40px;
height:520px;
overflow-y:scroll;
padding-right:18px;
}

/* =========================
preview
========================= */

.project-grid{
display:grid;
grid-template-columns:320px 1fr;
gap:34px;
}

.project-preview{
display:flex;
flex-direction:column;
gap:18px;
position:sticky;
top:0;
}

.project-preview-image{
width:100%;
aspect-ratio:1/1;
overflow:hidden;
border:1px solid rgba(255,255,255,0.18);
}

.project-preview-image img{
width:100%;
height:100%;
object-fit:cover;
}

/* =========================
button
========================= */

.project-button{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:160px;
padding:14px 20px;
border:1px solid var(--button-border);
background:var(--button-bg);
font-size:15px;
font-weight:700;
}

/* =========================
text
========================= */

.project-copy h2{
margin:0 0 20px;
font-size:28px;
line-height:1.1;
}

.project-copy p{
margin:0 0 24px;
font-size:18px;
line-height:1.72;
color:var(--muted);
}

/* =========================
footer
========================= */

.footer{
margin-top:34px;
padding-top:18px;
border-top:1px solid rgba(255,255,255,0.16);
text-align:center;
color:var(--muted);
font-size:14px;
}

</style>
</head>

<body>

<div class="page">
<div class="frame">

<div class="site-title">
<span class="portfolio-word">PORTFOLIO</span>
<span class="name-word">Chi Wai Lau</span>
</div>

<header class="topbar">

<nav class="nav">

<a href="about.html">About Me</a>

<div class="dropdown">

<a href="#">Selected Works</a>

<div class="dropdown-menu">

<a href="samaroli.html">Samaroli</a>
<a href="pizzaexpress.html">Pizzaexpress</a>
<a href="canon.html">Canon</a>
<a href="kmb.html">KMB</a>
<a href="illustration-book.html">Illustration Book</a>
<a href="youtube-channel.html">Youtube Channel</a>

</div>
</div>
</nav>

</header>

<main class="hero">

<div class="hero-image-wrap">

<img class="hero-image"
src="assets/hero-studio.png">

<div class="hero-center-logo">
<img src="assets/logo.png">
</div>

<div class="hero-headline">
Where brand strategy meets craft and visual storytelling.
</div>

</div>

</main>

<footer class="footer">
© 2026 Chi Wai Lau. All Rights Reserved.
</footer>

</div>
</div>

</body>
</html>
