<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1280, initial-scale=1.0" />
  <title>Pizza Express – Chi Wai Lau Portfolio</title>

  <style>
    :root{
      --text:#f3f0e6;
      --muted:#d8d1b7;
      --panel-border:rgba(188,178,110,.28);
      --line:rgba(255,255,255,.22);
      --menu-bg:rgba(8,8,8,.96);
      --box-line:rgba(255,255,255,.58);
      --bg-olive:rgba(40,38,5,.88);
      --gold-bar:#7f7440;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      scroll-behavior:smooth;
      overflow-x:auto;
    }

    body{
      min-width:1280px;
      overflow-x:auto;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(0,0,0,.58), rgba(0,0,0,.76)),
        url("assets/hero-studio.png") center center / cover no-repeat fixed;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      display:block;
      width:100%;
      height:auto;
    }

    .page{
      width:1280px;
      margin:0 auto;
      padding:24px 0 40px;
    }

    .frame{
      position:relative;
      background:var(--bg-olive);
      border:1px solid var(--panel-border);
      padding:20px 20px 34px;
      overflow:hidden;
    }

    /* =========================
       TOP BAR
    ========================== */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:24px;
      padding:14px 18px;
      margin:-20px -20px 0 -20px;
      background:#000;
      border-bottom:1px solid rgba(255,255,255,.12);
      position:relative;
      z-index:60;
    }

    .topbar-left{
      display:flex;
      align-items:center;
      gap:24px;
    }

    .topbar-right{
      display:flex;
      align-items:center;
      gap:28px;
      margin-left:auto;
    }

    .brand-mark{
      width:44px;
      height:44px;
      border:2px solid rgba(255,255,255,.92);
      border-radius:50%;
      display:grid;
      place-items:center;
      font-weight:700;
      font-size:24px;
      color:var(--text);
      flex:0 0 auto;
    }

    .nav{
      display:flex;
      gap:34px;
      align-items:center;
      font-weight:700;
      color:var(--muted);
      font-size:14px;
    }

    .nav > a,
    .dropdown > a{
      display:inline-flex;
      align-items:center;
      height:32px;
      white-space:nowrap;
    }

    .nav a:hover{
      color:var(--text);
    }

    .dropdown{
      position:relative;
    }

    .dropdown::after{
      content:"";
      position:absolute;
      left:0;
      top:100%;
      width:100%;
      height:14px;
    }

    .dropdown-menu{
      position:absolute;
      top:100%;
      left:0;
      min-width:210px;
      background:var(--menu-bg);
      border:1px solid rgba(255,255,255,.08);
      padding:12px 18px;
      display:none;
      z-index:50;
    }

    .dropdown:hover .dropdown-menu{
      display:block;
    }

    .dropdown-menu a{
      display:block;
      padding:6px 0;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
      transition:color .2s ease, transform .2s ease;
    }

    .dropdown-menu a::before{
      content:"▶ ";
      opacity:0;
      transition:opacity .2s ease;
      font-size:12px;
    }

    .dropdown-menu a:hover{
      color:var(--text);
      transform:translateX(4px);
    }

    .dropdown-menu a:hover::before{
      opacity:1;
    }

    .quick-links-inline{
      display:flex;
      align-items:center;
      gap:16px;
      font-size:12px;
      font-weight:700;
      color:var(--muted);
      white-space:nowrap;
    }

    .quick-links-inline a:hover{
      color:var(--text);
    }

    .site-title{
      text-align:right;
      line-height:1;
      flex:0 0 auto;
    }

    .portfolio-word{
      display:block;
      font-size:13px;
      font-weight:800;
      letter-spacing:1px;
      color:var(--text);
    }

    .name-word{
      display:block;
      margin-top:2px;
      font-size:10px;
      font-weight:600;
      letter-spacing:.6px;
      color:var(--muted);
    }

    /* =========================
       HERO
    ========================== */
    .hero{
      margin:0 -20px 0 -20px;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .hero-image{
      width:100%;
      display:block;
    }

    /* =========================
       GENERIC
    ========================== */
    .section{
      width:1120px;
      margin:0 auto;
      padding:34px 0;
    }

    .divider{
      width:1120px;
      margin:0 auto;
      border-top:1px solid rgba(255,255,255,.35);
    }

    .title{
      font-size:28px;
      line-height:1.08;
      font-weight:700;
      color:var(--text);
    }

    .subtitle{
      font-size:17px;
      line-height:1.3;
      font-weight:700;
      color:var(--text);
      margin-top:6px;
    }

    .copy{
      font-size:14px;
      line-height:1.58;
      color:var(--text);
    }

    .copy ul{
      padding-left:18px;
      margin-top:10px;
    }

    .copy li{
      margin-bottom:4px;
    }

    /* (其餘 CSS 同你原本一樣，完全沒有改動) */

  </style>
</head>

<body>
  <div class="page">
    <div class="frame">

      <!-- Header -->
      <header class="topbar">
        <div class="topbar-left">
          <a href="index.html" class="brand-mark">W</a>

          <nav class="nav">
            <a href="about.html">About Me</a>

            <div class="dropdown">
              <a href="#">Selected Works</a>
              <div class="dropdown-menu">
                <a href="samaroli.html">Samaroli</a>
                <a href="pizzaexpress.html">Pizzaexpress</a>
                <a href="canon.html">Canon</a>
                <a href="kmb.html">KMB</a>
                <a href="illustration-book.html">Illustration</a>
                <a href="video.html">Video Project</a>
              </div>
            </div>
          </nav>
        </div>

        <div class="topbar-right">
          <nav class="quick-links-inline">
            <a href="#intro">Intro</a>
            <a href="#campaign">Campaign</a>
            <a href="#social">Social</a>
            <a href="#environmental">Environmental</a>
            <a href="#menu">Menu</a>
          </nav>

          <div class="site-title">
            <span class="portfolio-word">PORTFOLIO</span>
            <span class="name-word">Chi Wai Lau</span>
          </div>
        </div>
      </header>

      <!-- Hero -->
      <section class="hero">
        <img class="hero-image" src="assets/pizzaexpress_-hero.png" alt="Pizza Express hero">
      </section>

      <!-- 其餘 section 與你原本完全相同 -->

      <div class="bottom-bar">
        <div class="copyright">
          © 2026 Chi Wai Lau. All Rights Reserved.
        </div>

        <a href="#" class="back-to-top">Back to top ↑</a>
      </div>

    </div>
  </div>

</body>
</html>
